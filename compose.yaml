services:
  postgres:
    image: postgres:16-alpine
    container_name: ${POSTGRES_CONTAINER:-postgres-massive-dml-lab}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-massive_dml_lab}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-55432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 2s
      timeout: 3s
      retries: 30

  noisia:
    image: ${NOISIA_IMAGE:-lesovsky/noisia:latest}
    platform: ${NOISIA_PLATFORM:-linux/amd64}
    profiles:
      - workload
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint:
      - noisia
    command:
      - --help

volumes:
  postgres-data:
